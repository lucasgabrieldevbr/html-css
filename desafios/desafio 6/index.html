<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tags HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.</p>
    <ul type="square">
        <li>
        <abbr title="use a tag <p>">Paragrafo</abbr>
        </li>
         <li>
            <abbr title="use a tag <h1>">títulos</abbr>
        </li>
        <li>
            <abbr title="use a tag <img>">imagem</abbr>
        </li>
        <li>
        <abbr title="use a tag <abbr>">abreviaçao</abbr>
        </li>
        <li>
         <abbr title="use a tag <code>">Codigo-fonte</abbr>
        </li>
        <li>
        <abbr title="use a tag <ol>">Lista numerada</abbr>
        </li>
        <li>
<abbr title="use a tag <ul>">Lista com demarcadores</abbr>
        </li>
    </ul>
</body>
</html>
