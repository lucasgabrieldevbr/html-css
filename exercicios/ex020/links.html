<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>personalizando Links</title>
    <style>
        /* #=id
        .= class
        :=pseudo-elemento
        > = clidren
        */
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: red;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited{
            color: brown;
        }
        a:hover{
            text-decoration: underline;
            color: aqua;
        }
        a:active{
            color: yellow;
        }
        .especial::before{
            content:'-->' ;
        }
        .especial::after{
            content: '<--';
            text-decoration: none;
            font-weight: normal;
            color: darkgray;
        }
        .especial{
            background-color: blue;
        }
    </style>
</head>
<body>
    <h1>personalizando Links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank" rel="external">repositorio github</li></a>
        <li><a class="especial" href="https://youtube.com/cursoemvideo/" target="_blank" rel="external">canal do youtube</li></a>
        <li><a href="https://www.cursoemvideo.com" class="especial">site do cursoemvideo</li></a>
    </ul>
</body>
</html>
