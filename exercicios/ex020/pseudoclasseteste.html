<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gpt</title>
    <style>
        div >  p {
            display: none;
        }
        div:hover > p {
         display: block;
         width: 200px;
         color: aquamarine;
         background-color: brown;
        }

        div:hover{
            color: blueviolet;
        }
        div:active{
            color: rgb(126, 9, 9);
        }
        
        
    </style>
    
</head>
<body>
    <h1>teste 1</h1>
    <p>passe o mouse aqui</p>
    <div><h1>ola mundo</h1>
     <p>ola terra</p></div>
</body>
</html>
