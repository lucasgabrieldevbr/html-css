<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formataçao de texto</title>
</head>
<body>
   <h1>Principais formataçoes</h1>
   <h2> negrito / destaque</h2>
   <p>nesta frase temos um <b> termo em negrito</b> usando a tag b</p>
   <p>nesta frase temos um <strong> termo em destaque</strong> usando a tag strong (que tem a mesma função do b, mas é mais semântica)</p>
   <h2>Itálico / ênfase</h2>
   <p> nesta frase temos um <i>termo em italico</i> usando a tag i </p>
</body>
</html>
