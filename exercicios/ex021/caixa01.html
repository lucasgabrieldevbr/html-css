<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>modelo de caixa</title>
    <style>
        h1{ /* box level*/

            
            background-color: bisque;
            height: 300px;
            width: 300px;
            
            
            border: 10px solid black;
             

            padding: 10px;

            margin: 20px auto 40px auto;

            outline: 5px dashed black;  
        } 
        a{ /*box inline*/ 

            border-width: 10px;
            border-style: solid;
            border-color: brown;

             padding-top: 10px;
            padding-left: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
        }
        
    </style>
</head>
<body>
    <h1>exemplo de caixa box-level</h1>
    <p>paragrafos tambem sao exemplos de caixa box level, mas os <a href="#">links sao exemplos de inline-level</a>. vamos ver como funciona</p>
</body>
</html>
