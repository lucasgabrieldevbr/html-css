<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>midias em html5</title>
</head>
<body>
    <h1>imagem dinamica</h1>
    <p>
        tente abrir esse site em varios dispositvos diferentes ou simplismente aumente e diminua o tamanho do seu navegador
    </p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagem/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagem/foto-m.png" type="image/png">
        <img src="imagem/foto-g.png" alt="imagem flexivel">
    </picture>
   <h1>reprodução audio</h1>
   <p>vamos repoduzir audio</p>
   <audio preload="metadata" autoplay controls>
   <source src="midia/domingo de verao.mpeg" type="audio/mpeg">
   <source src="midia/domingo de verao.ogg" type="audio/ogg">
   <p>seu navegador não suporta a tag de audio</p>
   </audio>
</body>
</html>
